<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skincare & Body-Care Routine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="app-container">
        <header>
            <div class="header-top">
                <h1 id="date-display">Today's Routine</h1>
                <p id="greeting" class="greeting-text">Let's get glowing!</p>
            </div>
            <div class="cycle-badges">
                <div class="badge-card" id="face-badge-card">
                    <span class="badge-title">Face Cycle</span>
                    <span class="badge-value" id="face-badge">Night -</span>
                </div>
                <div class="badge-card" id="body-badge-card">
                    <span class="badge-title">Body Treatment</span>
                    <span class="badge-value" id="body-badge">-</span>
                </div>
            </div>
        </header>

        <section class="calendar-section" id="calendar-section">
            <div class="section-header">
                <h2>Routine History</h2>
            </div>
            <div class="calendar-grid" id="calendar-grid">
                <!-- Calendar days injected here -->
            </div>
        </section>

        <main>
            <section class="routine-section" id="morning-section">
                <div class="section-header">
                    <h2>Morning Routine</h2>
                    <span class="time-hint">7:00 AM - 8:00 AM</span>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" id="morning-progress"></div>
                </div>
                <div class="task-list" id="morning-list"></div>
                
                <div class="completed-tasks-wrapper">
                    <details class="completed-tasks-details">
                        <summary>Completed Tasks</summary>
                        <div class="task-list completed-list" id="morning-completed-list"></div>
                    </details>
                </div>
            </section>

            <section class="routine-section" id="evening-section">
                <div class="section-header">
                    <h2>Evening Routine</h2>
                    <span class="time-hint">8:30 PM - 9:30 PM</span>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" id="evening-progress"></div>
                </div>
                <div class="task-list" id="evening-list"></div>
                
                <div class="completed-tasks-wrapper">
                    <details class="completed-tasks-details">
                        <summary>Completed Tasks</summary>
                        <div class="task-list completed-list" id="evening-completed-list"></div>
                    </details>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
